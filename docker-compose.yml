version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./db:/var/lib/postgresql/data

  backend:
    build: ./backend
    env_file: .env
    command: >
      sh -c "python manage.py migrate && gunicorn project.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    image: cirrusci/flutter:stable
    build: ./frontend
    env_file: .env
    command: >
      sh -c "flutter pub get && flutter build web --${FLUTTER_BUILD_MODE:-release} && cd build/web && python3 -m http.server 8080"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    ports:
      - "8080:8080"
