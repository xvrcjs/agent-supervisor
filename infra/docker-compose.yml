version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    command: >
      sh -c "python manage.py migrate &&
             gunicorn project.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - ../backend:/app
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG}
      WHATSAPP_API_TOKEN: ${WHATSAPP_API_TOKEN}
      ALLOWED_YOUTUBE_CATEGORIES: ${ALLOWED_YOUTUBE_CATEGORIES}
    depends_on:
      - db
      - redis
      - rabbitmq
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    command: >
      sh -c "flutter pub get &&
             flutter build apk --${FLUTTER_BUILD_MODE} &&
             cp build/app/outputs/flutter-apk/app-${FLUTTER_BUILD_MODE}.apk /output/"
    volumes:
      - ../frontend:/app
      - ./output:/output
    environment:
      FLUTTER_BUILD_MODE: ${FLUTTER_BUILD_MODE}
    depends_on:
      - backend

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.9.0
    environment:
      - discovery.type=single-node
    ports:
      - "9200:9200"

volumes:
  db_data:
